name: Deploy Website

on:
  push:
    branches:
      - main  # Triggers the pipeline on every push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download the code from the repo
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Configure AWS credentials securely using secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # Change to your chosen S3 region

    # Step 3: Deploy files to S3 bucket
    - name: Deploy to S3
      run: |
        aws s3 sync . s3://my-cool-web-assets-2026 --delete --exclude ".git*" --exclude ".github*"

    # Step 4: Invalidate CloudFront Cache so changes reflect globally instantly
    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"
